name: deploy

# 代码提交到main分支时触发github action
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
              fetch-depth: 0

        - name: Setup Hugo
          uses: peaceiris/actions-hugo@v3
          with:
              hugo-version: "latest"
              extended: true

        - name: Build Web
          run: hugo -D

        - name: Deploy Web
          uses: peaceiris/actions-gh-pages@v4
          with:
              PERSONAL_TOKEN: ${{ secrets.ACCESS_TOKEN }}
              EXTERNAL_REPOSITORY: baicai220/baicai220.github.io
              PUBLISH_BRANCH: gh-pages  # 修改为 gh-pages 分支
              PUBLISH_DIR: ./public
              commit_message: auto deploy    